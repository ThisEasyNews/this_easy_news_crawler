name: News Batch Cron Job

on:
  schedule:
    # UTC 기준 15시(00시), 21시(06시), 03시(12시), 09시(18시)
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch: # 테스트를 위해 버튼으로 수동 실행 가능하게 유지

jobs:
  run-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run News Collection & Summary
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 통합 실행 파일 실행
          python -m app.main_batch